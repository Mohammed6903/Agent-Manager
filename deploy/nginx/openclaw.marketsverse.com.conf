# nginx reverse-proxy config for openclaw.marketsverse.com (production).
#
# This is a REFERENCE copy of what lives on the production host in
# /etc/nginx/sites-enabled/openclaw.marketsverse.com. Keep it in sync
# by hand when you change the live config.
#
# Architecture:
#   - openclaw.marketsverse.com is terminated by nginx with Let's Encrypt TLS.
#   - /api/*         → uvicorn on 127.0.0.1:8000 (OpenClawApi / FastAPI)
#   - /               → openclaw gateway on 127.0.0.1:18789 (Node process,
#                       also upgraded to WS for /mcp, /rpc, etc.)
#
# Several /api/* paths need explicit WebSocket upgrade blocks because the
# default /api/ location intentionally omits `proxy_http_version 1.1` +
# `Upgrade` headers (those would interfere with SSE streaming, which the
# chat endpoint relies on). Each WS route gets its own location.

server {
    server_name openclaw.marketsverse.com;
    client_max_body_size 50M;

    # ── Default /api/ block (SSE-friendly, NO WebSocket upgrade) ──────────
    # Used for chat streaming (Server-Sent Events), REST endpoints, and
    # webhook delivery. Buffering is explicitly disabled so SSE chunks
    # flush to the client immediately instead of being coalesced by nginx.
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE support for streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # ── Openclaw gateway (Node process) ───────────────────────────────────
    # Handles /mcp, /rpc, and any other gateway routes. This block DOES do
    # WS upgrade because the gateway uses WebSocket-based RPC internally.
    location / {
        proxy_pass http://127.0.0.1:18789;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket endpoints under /api/* ──────────────────────────────────
    # Each needs its own block because the catch-all /api/ above deliberately
    # does NOT do `proxy_http_version 1.1` + Upgrade (SSE-compatible).
    # nginx matches the most-specific location first, so these take precedence
    # over /api/ for their exact paths.

    location /api/activity/ws {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/tasks/ws {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/crons/ws {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Telnyx media streaming WebSocket — long-lived (up to 10 minutes per
    # voice call). The extended read/send timeouts prevent nginx from
    # killing the connection mid-call (default is 60 s, way too short).
    # Path prefix is /api/voice/stream/{call_id} — match the trailing slash
    # so any call_id suffix is routed here.
    location /api/voice/stream/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket connections are long-lived — don't time them out
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── TLS (managed by Certbot) ──────────────────────────────────────────
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/openclaw.marketsverse.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/openclaw.marketsverse.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# ── HTTP → HTTPS redirect (managed by Certbot) ────────────────────────────
server {
    if ($host = openclaw.marketsverse.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name openclaw.marketsverse.com;
    return 404; # managed by Certbot
}
